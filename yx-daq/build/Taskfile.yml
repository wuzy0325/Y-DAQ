version: '3'

tasks:
  go:mod:tidy:
    internal: true
    cmds:
      - go mod tidy

  install:frontend:deps:
    internal: true
    dir: frontend
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules
    cmds:
      - npm install

  generate:bindings:
    internal: true
    deps:
      - task: go:mod:tidy
    cmds:
      - wails3 generate bindings -f '{{.BUILD_FLAGS}}' -clean=true -ts

  build:frontend:
    internal: true
    dir: frontend
    deps:
      - task: install:frontend:deps
      - task: generate:bindings
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
    cmds:
      - npm run build

  generate:icons:
    internal: true
    dir: build
    sources:
      - "appicon.png"
    generates:
      - "windows/icon.ico"
    cmds:
      - wails3 generate icons -input appicon.png -windowsfilename windows/icon.ico

  generate:syso:
    internal: true
    dir: build
    deps:
      - task: generate:icons
    cmds:
      - wails3 generate syso -arch amd64 -icon windows/icon.ico -manifest windows/wails.exe.manifest -info windows/info.json -out ../wails_windows_amd64.syso

  build:
    summary: Builds the Windows application
    deps:
      - task: build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
      - task: generate:syso
    cmds:
      - go build {{.BUILD_FLAGS}} -o "{{.BIN_DIR}}/{{.APP_NAME}}.exe"
      - cmd: powershell -Command "Remove-Item -LiteralPath 'wails_windows_amd64.syso' -ErrorAction SilentlyContinue"
    vars:
      BUILD_FLAGS: '{{if eq .DEV "true"}}-buildvcs=false -gcflags=all="-l"{{else}}-tags production -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui"{{end}}'

  dev:frontend:
    summary: Runs the frontend in development mode
    dir: frontend
    deps:
      - task: install:frontend:deps
    cmds:
      - npm run dev -- --port {{.VITE_PORT}} --strictPort

  run:
    summary: Runs the built application
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}.exe'
