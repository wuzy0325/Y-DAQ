version: '3'

includes:
  common: ../Taskfile.yml

tasks:
  build:
    summary: Builds the Windows application
    cmds:
      - task: common:build
        vars:
          DEV: '{{.DEV}}'

  package:
    summary: Packages the application as NSIS installer
    cmds:
      - task: create:nsis:installer
        vars:
          ARCH: '{{.ARCH | default "amd64"}}'

  create:nsis:installer:
    summary: Creates an NSIS installer
    dir: build/windows/nsis
    deps:
      - task: common:build
        vars:
          DEV: '{{.DEV}}'
    cmds:
      - wails3 generate webview2bootstrapper -dir "{{.ROOT_DIR}}/build/windows/nsis"
      - cmd: makensis -DARG_WAILS_AMD64_BINARY="{{.ROOT_DIR}}\bin\yx-daq.exe" project.nsi
      - cmd: '& "C:\Program Files (x86)\NSIS\Bin\makensis.exe" -DARG_WAILS_AMD64_BINARY="{{.ROOT_DIR}}\bin\yx-daq.exe" project.nsi'
        platforms: [windows]
    vars:
      ARCH: '{{.ARCH | default "amd64"}}'

  run:
    summary: Runs the Windows application
    cmds:
      - task: common:run
